<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Detail | IEEE TEMS Bangalore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main>
        <!-- Article Header -->
        <section class="blog-detail-hero" id="blog-header">
            <div class="container">
                <div class="text-container">
                    <a href="blogs.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to All News</a>
                    <span id="blog-detail-cat" class="section-label mt-20">CATEGORY</span>
                    <h1 id="blog-detail-title" class="ieee-heading" style="font-size: 2.5rem; margin-top: 10px;">Loading story...</h1>
                    <div class="blog-meta-detail">
                        <div class="meta-item"><i class="far fa-user"></i> <span id="blog-detail-author">...</span></div>
                        <div class="meta-item"><i class="far fa-calendar"></i> <span id="blog-detail-date">...</span></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Featured Image -->
        <section class="section-spacing py-0">
            <div class="container">
                <figure class="blog-featured-img-wrap reveal">
                    <div class="blog-featured-img-blur" id="blog-detail-blur"></div>
                    <img id="blog-detail-img" src="" alt="Featured Image">
                </figure>
            </div>
        </section>

        <!-- Article Content -->
        <section class="section-spacing blog-content-section">
            <div class="container">
                <div class="text-container">
                    <div id="blog-detail-content" class="blog-rich-text ieee-description">
                        <!-- Content injected here -->
                        <div style="padding: 40px 0; text-align: center;">
                            <i class="fas fa-circle-notch fa-spin"></i>
                        </div>
                    </div>

                    <!-- Share Section -->
                    <div class="blog-share-box">
                        <h4>Share this insight:</h4>
                        <div class="share-btns">
                            <a href="#" id="share-linkedin" target="_blank"><i class="fab fa-linkedin"></i></a>
                            <a href="#" id="share-twitter" target="_blank"><i class="fab fa-twitter"></i></a>
                            <a href="#" id="share-whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/navbar.js"></script>
    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const blogId = params.get('id');
            const UPLOADS_BASE = BACKEND_BASE + '/uploads/';

            if (!blogId) {
                window.location.href = 'blogs.html';
                return;
            }

            try {
                // Fetch specific blog using the direct ID endpoint
                const res = await API.apiFetch(`/blogs/${blogId}`);
                if (res && res.status === 'success') {
                    const blog = res.data;
                    
                    // Populate UI
                    document.title = `${blog.title} | IEEE TEMS Bangalore`;
                    document.getElementById('blog-detail-title').textContent = blog.title;
                    document.getElementById('blog-detail-cat').textContent = blog.category || 'NEWS';
                    document.getElementById('blog-detail-author').textContent = blog.author || 'IEEE TEMS';
                    document.getElementById('blog-detail-date').textContent = new Date(blog.date || blog.createdAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                    
                    const imgUrl = blog.image ? (blog.image.startsWith('http') ? blog.image : `${UPLOADS_BASE}${blog.image}`) : null;
                    const figure = document.querySelector('.blog-featured-img-wrap');
                    if (imgUrl) {
                        document.getElementById('blog-detail-img').src = imgUrl;
                        document.getElementById('blog-detail-blur').style.backgroundImage = `url('${imgUrl}')`;
                    } else if (figure) {
                        figure.style.display = 'none';
                    }

                    // Simple markdown-ish conversion for content (handle newlines as paragraphs)
                    const contentHtml = blog.content.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('');
                    document.getElementById('blog-detail-content').innerHTML = contentHtml;

                    // Setup Share Links
                    const url = encodeURIComponent(window.location.href);
                    const title = encodeURIComponent(blog.title);
                    document.getElementById('share-linkedin').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
                    document.getElementById('share-twitter').href = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
                    document.getElementById('share-whatsapp').href = `https://api.whatsapp.com/send?text=${title}%20${url}`;

                }
            } catch (e) {
                console.error(e);
                document.getElementById('blog-detail-content').innerHTML = '<p style="color: red;">Failed to load story content.</p>';
            }
        });
    </script>

    <style>
        /* ── Hero header ── */
        .blog-detail-hero {
            padding: 48px 0 72px;
            background: linear-gradient(180deg, #f8fafc 0%, #eaf0f6 100%);
            border-bottom: 1px solid #e4ebf2;
        }
        .blog-detail-hero .text-container { max-width: 820px; margin: 0 auto; text-align: center; }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--ieee-blue); text-decoration: none; font-weight: 700;
            font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase;
            margin-bottom: 26px; transition: gap 0.2s ease, color 0.2s ease;
        }
        .back-link:hover { gap: 12px; color: var(--ieee-royal-blue); }

        #blog-detail-cat {
            display: inline-block;
            background: var(--ieee-gold);
            color: #0b1f33;
            font-size: 0.68rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
            padding: 6px 16px; border-radius: 50px; margin-bottom: 20px;
        }
        #blog-detail-title {
            font-size: clamp(2rem, 4vw, 3rem) !important;
            font-weight: 800; color: #0b1f33; line-height: 1.15;
            margin: 0 0 22px !important;
        }
        .blog-meta-detail { display: flex; gap: 26px; margin-top: 0; justify-content: center; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #5a6a7a; font-weight: 600; }
        .meta-item i { color: var(--ieee-gold); }

        /* ── Featured image — full poster on a blurred backdrop of itself ── */
        .blog-featured-img-wrap {
            position: relative;
            width: 100%;
            max-width: 920px;
            margin: -52px auto 0;
            min-height: 320px;
            max-height: 82vh;
            border-radius: 18px;
            overflow: hidden;
            background: #0b1f33;
            box-shadow: 0 30px 70px -20px rgba(11, 31, 51, 0.55);
            border: 6px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .blog-featured-img-blur {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(34px) brightness(0.55);
            transform: scale(1.25);
        }
        .blog-featured-img-wrap img {
            position: relative; z-index: 2;
            max-width: 100%; max-height: 82vh;
            width: auto; height: auto;
            object-fit: contain;
            display: block;
        }

        /* ── Article content ── */
        .blog-content-section { padding: 64px 0 40px; }
        .blog-content-section .text-container { max-width: 720px; margin: 0 auto; }
        .blog-rich-text { font-size: 1.18rem; line-height: 1.9; color: #2d3e50; }
        .blog-rich-text p { margin-bottom: 26px; }
        .blog-rich-text p:first-of-type::first-letter {
            float: left; font-size: 3.6rem; line-height: 0.82; font-weight: 800;
            color: var(--ieee-royal-blue); padding: 6px 14px 0 0;
        }

        /* ── Share box ── */
        .blog-share-box {
            margin-top: 56px; padding: 26px 32px;
            background: #f8fafc; border-radius: 14px; border: 1px solid #e8edf3;
            display: flex; justify-content: space-between; align-items: center;
        }
        .blog-share-box h4 { margin: 0; font-size: 1rem; color: #0b1f33; font-weight: 700; }
        .share-btns { display: flex; gap: 14px; }
        .share-btns a {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; color: #0b1f33; border: 1px solid #e2e8f0;
            transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
            font-size: 1.1rem;
        }
        .share-btns a:hover { transform: translateY(-3px); color: #fff; border-color: transparent; }
        .share-btns a:nth-child(1):hover { background: #0077b5; }
        .share-btns a:nth-child(2):hover { background: #1da1f2; }
        .share-btns a:nth-child(3):hover { background: #25d366; }

        @media (max-width: 768px) {
            .blog-detail-hero { padding: 28px 0 52px; }
            .blog-featured-img-wrap { margin-top: -34px; max-height: 70vh; border-width: 4px; border-radius: 14px; }
            .blog-featured-img-wrap img { max-height: 70vh; }
            .blog-content-section { padding: 40px 0 30px; }
            .blog-rich-text { font-size: 1.05rem; }
            .blog-rich-text p:first-of-type::first-letter { font-size: 2.8rem; }
            .blog-share-box { flex-direction: column; gap: 18px; text-align: center; }
        }
    </style>
</body>
</html>
